name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - next

permissions:
  contents: read

jobs:
  release-npm:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.extract_version.outputs.version != '' }}
      new_release_version: ${{ steps.extract_version.outputs.version }}
    steps:
      - name: Checkout sources 🔰
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Node.js 24 🧮
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
      - name: Install dependencies ⏬
        run: npm ci
      - name: Check cryptographic signatures for dependencies 🔐
        run: npm audit signatures
      - name: Build project 🏗
        run: npm run build
      - name: Semantic Release 🚀
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
      - name: Extract Version from updated package.json 📦
        id: extract_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
  release-docker:
    needs: release-npm
    uses: ./.github/workflows/release_docker.yml
    with:
      release_is_published: ${{ needs.release-npm.outputs.new_release_published }}
      release_version: ${{ needs.release-npm.outputs.new_release_version }}
    secrets:
      nexus_user: ${{ secrets.NEXUS_USERNAME }}
      nexus_pass: ${{ secrets.NEXUS_PASSWORD }}
